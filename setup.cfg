[coverage:report]
exclude_lines =
    pragma: no cover
omit =
    setup.py

[coverage:run]
include=
    pytest_shard/
    tests/*

[flake8]
max-line-length=100
ignore = W503,E203

[isort]
known_first_party=pytest_shard,tests
default_section=THIRDPARTY
multi_line_output=3
force_sort_within_sections=True
line_length=100

[pytype]
inputs = pytest_shard
python_version = 3.7
